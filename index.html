<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RogueTeX Cloud</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/stex/stex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    :root {
        --bg-body: #f1f5f9; --bg-surface: #ffffff; --bg-panel: #f8fafc;
        --border-light: #cbd5e1; --text-main: #0f172a; --text-muted: #475569;
        --accent-primary: #2563eb; --accent-success: #059669; --accent-danger: #dc2626;
        --accent-warning: #d97706;
        --radius-md: 6px; --font-sans: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); font-size: 16px; }
    body { background: var(--bg-body); height: 100vh; display: flex; overflow: hidden; }
    .app-container { display: flex; flex-direction: column; width: 100%; height: 100%; }

    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fff; border-bottom: 2px solid var(--border-light); flex-shrink: 0; }
    .brand h1 { font-size: 24px; font-weight: 700; color: var(--text-main); }
    .auth-zone { display: flex; align-items: center; gap: 16px; font-weight: 600; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border-light); gap: 12px; flex-shrink: 0; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; font-size: 14px; font-weight: 600; border-radius: var(--radius-md); border: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; background: #fff; color: var(--text-main); white-space: nowrap; }
    .btn:hover { border-color: #94a3b8; background: #f8fafc; }
    .btn-primary { background: var(--accent-primary); color: #fff; border: none; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-success { background: var(--accent-success); color: #fff; border: none; }
    .btn-success:hover { background: #047857; }
    .btn-danger { background: var(--accent-danger); color: #fff; border: none; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
    .title-input { flex: 1; padding: 9px 14px; font-size: 15px; font-weight: 600; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: #fff; min-width: 0; }

    .workspace { display: flex; flex: 1; min-height: 0; }

    .sidebar-projects { width: 240px; background: var(--bg-panel); border-right: 2px solid var(--border-light); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-projects-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 8px; }
    .sidebar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-weight: 700; }
    .sidebar-projects-list { flex: 1; overflow-y: auto; padding: 8px; }

    .new-project-group { display: flex; gap: 4px; }
    .new-project-group .btn { flex: 1; justify-content: center; font-size: 13px; padding: 8px 10px; }
    .dropdown-wrapper { position: relative; }
    .dropdown-toggle { padding: 8px 10px !important; }
    .dropdown-menu { position: absolute; top: calc(100% + 4px); right: 0; background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-md); box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; min-width: 210px; overflow: hidden; display: none; }
    .dropdown-menu.open { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-main); transition: 0.15s; }
    .dropdown-item:hover { background: #f0f7ff; color: var(--accent-primary); }

    .project-item { padding: 10px 12px; border-radius: var(--radius-md); margin-bottom: 4px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.15s; color: var(--text-main); border: 1px solid transparent; }
    .project-item:hover { background: #f0f7ff; border-color: #bfdbfe; }
    .project-item.active { background: #eff6ff; border-color: var(--accent-primary); font-weight: 600; color: var(--accent-primary); }
    .project-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-item-delete { flex-shrink: 0; background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 2px; border-radius: 4px; display: none; line-height: 0; }
    .project-item:hover .project-item-delete { display: block; }
    .project-item-delete:hover { color: var(--accent-danger); background: #fee2e2; }

    .editor-area { flex: 1; display: flex; min-width: 0; }

    .file-panel { width: 220px; background: #fff; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; flex-shrink: 0; }
    .file-panel-header { padding: 12px 14px; border-bottom: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 8px; }
    .file-panel-actions { display: flex; gap: 6px; }
    .file-panel-actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 7px 8px; }
    .file-panel-body { flex: 1; overflow-y: auto; padding: 8px; }

    .file-group { margin-bottom: 12px; }
    .file-group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; padding: 4px 6px 6px; display: flex; align-items: center; gap: 6px; }
    .file-entry { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; transition: 0.15s; border: 1px solid transparent; color: var(--text-main); }
    .file-entry:hover { background: #f8fafc; border-color: var(--border-light); }
    .file-entry.active-file { background: #eff6ff; border-color: #bfdbfe; font-weight: 600; color: var(--accent-primary); }
    .file-entry-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-entry-remove { flex-shrink: 0; background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 2px; border-radius: 3px; display: none; line-height: 0; }
    .file-entry:hover .file-entry-remove { display: block; }
    .file-entry-remove:hover { color: var(--accent-danger); }
    .icon-tex { color: #2563eb; } .icon-bib { color: #059669; } .icon-img { color: #d97706; } .icon-other { color: #94a3b8; }

    .editor-column { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .CodeMirror { flex: 1; height: 100% !important; font-family: 'JetBrains Mono', monospace !important; font-size: 14px !important; }
    .CodeMirror-scroll { height: 100%; }

    /* ── Preview pane ── */
    .preview { width: 45%; background: #525659; border-left: 2px solid var(--border-light); display: flex; flex-direction: column; flex-shrink: 0; position: relative; }
    .preview-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #3c3f41; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; gap: 8px; }
    .preview-toolbar span { font-size: 12px; color: #ccc; font-weight: 500; }
    .preview-toolbar .btn { padding: 5px 12px; font-size: 12px; background: #525659; border-color: #666; color: #eee; }
    .preview-toolbar .btn:hover { background: #6b6f72; }
    #pdfFrame { flex: 1; width: 100%; border: none; display: block; background: #525659; }
    .preview-placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: #aaa; flex-direction: column; gap: 12px; padding: 32px; background: #525659; }
    .preview-placeholder p { font-size: 14px; color: #888; }

    /* PDF loading spinner overlay */
    #pdfLoadingOverlay {
        position: absolute; inset: 40px 0 0 0;
        background: #525659;
        display: none; align-items: center; justify-content: center;
        flex-direction: column; gap: 14px; z-index: 10;
    }
    #pdfLoadingOverlay.show { display: flex; }
    #pdfLoadingOverlay p { font-size: 13px; color: #bbb; }

    #authModal { position: fixed; inset: 0; background: rgba(15,23,42,0.6); display: none; align-items: center; justify-content: center; z-index: 999; }
    #authModal.show { display: flex; }
    .modal-content { background: white; padding: 40px; border-radius: 12px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-content h2 { margin-bottom: 20px; font-size: 22px; font-weight: 700; }
    .modal-content input { width: 100%; padding: 11px 14px; margin-bottom: 14px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 14px; background: #fff; }
    .modal-content input:focus { outline: 2px solid var(--accent-primary); border-color: transparent; }
    #authError { color: var(--accent-danger); font-size: 13px; margin-top: 4px; min-height: 18px; }

    #confirmModal { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    #confirmModal.show { display: flex; }
    .confirm-box { background: #fff; padding: 28px 32px; border-radius: 10px; max-width: 380px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
    .confirm-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 2000; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    #uploadOverlay { position: fixed; inset: 0; background: rgba(15,23,42,0.55); display: none; align-items: center; justify-content: center; z-index: 1001; }
    #uploadOverlay.show { display: flex; }
    .upload-box { background: #fff; padding: 32px 40px; border-radius: 12px; text-align: center; min-width: 280px; }
    .upload-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .upload-box p { font-size: 13px; color: var(--text-muted); }
    .progress-bar-wrap { height: 6px; background: #e2e8f0; border-radius: 99px; margin-top: 16px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent-primary); border-radius: 99px; transition: width 0.2s; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    .empty-hint { font-size: 12px; color: var(--text-muted); padding: 8px 6px; }

    /* Spinner for PDF load */
    .pdf-spinner { width: 36px; height: 36px; border: 3px solid #555; border-top-color: #aaa; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<div class="app-container">
    <div class="topbar">
        <div class="brand"><h1>RogueTeX</h1></div>
        <div class="auth-zone" id="authZone"></div>
    </div>

    <div class="toolbar">
        <input type="text" id="docTitleInput" class="title-input" value="Untitled Project" placeholder="Project title...">
        <div style="display:flex;gap:8px;flex-shrink:0">
            <button class="btn btn-primary" id="compileBtn" onclick="compile()">
                <i data-lucide="play" style="width:16px;height:16px"></i> Compile
            </button>
            <button class="btn" id="saveCloudBtn" onclick="saveToCloud()" disabled>
                <i data-lucide="cloud" style="width:16px;height:16px"></i> Save
            </button>
            <button class="btn" onclick="downloadTeX()">
                <i data-lucide="download" style="width:16px;height:16px"></i> .tex
            </button>
            <button class="btn btn-success" id="downloadPdfBtn" onclick="downloadPDF()" disabled>
                <i data-lucide="file-down" style="width:16px;height:16px"></i> PDF
            </button>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar-projects">
            <div class="sidebar-projects-header">
                <div class="sidebar-label">Projects</div>
                <div class="new-project-group">
                    <button class="btn btn-primary" onclick="newBlankProject()">
                        <i data-lucide="plus" style="width:14px;height:14px"></i> New
                    </button>
                    <div class="dropdown-wrapper">
                        <button class="btn btn-primary dropdown-toggle" onclick="toggleDropdown()" title="Import project">
                            <i data-lucide="chevron-down" style="width:14px;height:14px"></i>
                        </button>
                        <div class="dropdown-menu" id="importDropdown">
                            <div class="dropdown-item" onclick="triggerImport('tex')">
                                <i data-lucide="file-text" style="width:15px;height:15px;color:#2563eb"></i> Import .tex file
                            </div>
                            <div class="dropdown-item" onclick="triggerImport('folder')">
                                <i data-lucide="folder-open" style="width:15px;height:15px;color:#d97706"></i> Import folder
                            </div>
                            <div class="dropdown-item" onclick="triggerImport('zip')">
                                <i data-lucide="archive" style="width:15px;height:15px;color:#7c3aed"></i> Import .zip archive
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sidebar-projects-list" id="cloudDocList">
                <div class="empty-hint">Sign in to sync projects...</div>
            </div>
        </div>

        <div class="editor-area">
            <div class="file-panel">
                <div class="file-panel-header">
                    <div class="sidebar-label">Project Files</div>
                    <div class="file-panel-actions">
                        <button class="btn" onclick="triggerAddFiles()">
                            <i data-lucide="plus" style="width:13px;height:13px"></i> Add files
                        </button>
                    </div>
                </div>
                <div class="file-panel-body" id="filePanelBody">
                    <div class="empty-hint">No files yet.</div>
                </div>
            </div>

            <div class="editor-column">
                <textarea id="editor"></textarea>
            </div>
        </div>

        <!-- Preview pane -->
        <div class="preview" id="previewPane">
            <!-- Toolbar (shown after first compile) -->
            <div class="preview-toolbar" id="previewToolbar" style="display:none">
                <span id="previewPageInfo">PDF ready</span>
                <div style="display:flex;gap:6px">
                    <button class="btn" onclick="reloadPdfFrame()" title="Reload">
                        <i data-lucide="refresh-cw" style="width:13px;height:13px"></i> Reload
                    </button>
                    <button class="btn" onclick="downloadPDF()">
                        <i data-lucide="download" style="width:13px;height:13px"></i> Save PDF
                    </button>
                </div>
            </div>

            <!-- Loading overlay (sits above the iframe) -->
            <div id="pdfLoadingOverlay">
                <div class="pdf-spinner"></div>
                <p>Rendering PDF…</p>
            </div>

            <!-- The iframe — src set programmatically via blob URL -->
            <iframe id="pdfFrame" style="display:none" title="PDF Preview"></iframe>

            <!-- Placeholder shown before first compile -->
            <div class="preview-placeholder" id="previewPlaceholder">
                <i data-lucide="eye" style="width:48px;height:48px;opacity:0.25;color:#aaa"></i>
                <p>Compile to see the PDF preview</p>
            </div>
        </div>
    </div>
</div>

<!-- Auth modal -->
<div id="authModal">
    <div class="modal-content">
        <h2>Scholar Sign In</h2>
        <input type="email" id="authEmail" placeholder="Email address" autocomplete="email">
        <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
        <div id="authError"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:14px;justify-content:center" onclick="processAuth('login')">Log In</button>
        <button class="btn" style="width:100%;margin-top:8px;justify-content:center;border:none" onclick="processAuth('signup')">Create Account</button>
        <button class="btn" style="width:100%;margin-top:8px;justify-content:center;border:none;color:var(--text-muted)" onclick="toggleModal(false)">Cancel</button>
    </div>
</div>

<!-- Confirm dialog -->
<div id="confirmModal">
    <div class="confirm-box">
        <h3 id="confirmTitle">Are you sure?</h3>
        <p id="confirmMsg"></p>
        <div class="confirm-actions">
            <button class="btn" onclick="resolveConfirm(false)">Cancel</button>
            <button class="btn btn-danger" onclick="resolveConfirm(true)">Delete</button>
        </div>
    </div>
</div>

<!-- Upload progress -->
<div id="uploadOverlay">
    <div class="upload-box">
        <h3 id="uploadTitle">Importing…</h3>
        <p id="uploadMsg"></p>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- Hidden inputs -->
<input type="file" id="importTexInput"    accept=".tex"        style="display:none" onchange="handleImportTex(this)">
<input type="file" id="importFolderInput" webkitdirectory multiple style="display:none" onchange="handleImportFolder(this)">
<input type="file" id="importZipInput"    accept=".zip"        style="display:none" onchange="handleImportZip(this)">
<input type="file" id="addFilesInput"     multiple accept=".bib,.png,.jpg,.jpeg,.pdf,.sty,.cls,.tex" style="display:none" onchange="handleAddFiles(this)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
lucide.createIcons();

const COMPILE_ENDPOINT = 'https://muhsabrys-rogue.hf.space/compile';
const SB_URL = 'https://suxvtsnkvjazrzhjtocg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1eHZ0c25rdmphenJ6aGp0b2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzExODUsImV4cCI6MjA5MzE0NzE4NX0.zglAuvR1cNrCENhQPz4bYeX2tfKwatbmQye1Ge71bVQ';
const sb = supabase.createClient(SB_URL, SB_KEY);

let editor, currentUser, currentDocId;
let projectFiles  = [];
let activeTexName = null;

// ── PDF state ──────────────────────────────────────────────
// We store the blob URL so we can revoke it before creating a new one,
// and reuse it for the download button without re-decoding base64.
let currentPdfBlobUrl = null;

window.onload = () => {
    editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: 'stex', theme: 'monokai', lineNumbers: true,
        lineWrapping: true, extraKeys: { 'Ctrl-S': () => saveToCloud() }
    });
    loadBlankTemplate('MSA Research', 'Muhammad S. Abdo');
    checkSession();
    lucide.createIcons();
    document.addEventListener('click', e => { if (!e.target.closest('.dropdown-wrapper')) closeDropdown(); });
};

/* ─── Auth ─────────────────────────────────────────────────── */
async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    syncAuthUI(session?.user ?? null);
    sb.auth.onAuthStateChange((_, s) => syncAuthUI(s?.user ?? null));
}

function syncAuthUI(user) {
    currentUser = user;
    const zone    = document.getElementById('authZone');
    const saveBtn = document.getElementById('saveCloudBtn');
    if (user) {
        zone.innerHTML = `<span style="font-size:13px;color:var(--text-muted)">${user.email}</span>
            <button class="btn" onclick="signOut()">Sign Out</button>`;
        saveBtn.disabled = false;
        fetchProjects();
    } else {
        zone.innerHTML = '<button class="btn btn-primary" onclick="toggleModal(true)">Sign In</button>';
        saveBtn.disabled = true;
        document.getElementById('cloudDocList').innerHTML = '<div class="empty-hint">Sign in to sync projects...</div>';
    }
    lucide.createIcons();
}

async function signOut() { await sb.auth.signOut(); }

async function processAuth(mode) {
    const email  = document.getElementById('authEmail').value.trim();
    const pass   = document.getElementById('authPass').value;
    const errDiv = document.getElementById('authError');
    errDiv.textContent = '';
    try {
        const res = mode === 'login'
            ? await sb.auth.signInWithPassword({ email, password: pass })
            : await sb.auth.signUp({ email, password: pass });
        if (res.error) throw res.error;
        toggleModal(false);
    } catch (err) { errDiv.textContent = err.message; }
}

function toggleModal(show) { document.getElementById('authModal').className = show ? 'show' : ''; }

/* ─── Projects ─────────────────────────────────────────────── */
async function fetchProjects() {
    const { data, error } = await sb.from('documents').select('id, title').order('created_at', { ascending: false });
    const list = document.getElementById('cloudDocList');
    if (error) { list.innerHTML = `<div style="color:var(--accent-danger);font-size:12px;padding:8px">${error.message}</div>`; return; }
    if (!data.length) { list.innerHTML = '<div class="empty-hint">No projects yet.</div>'; return; }
    list.innerHTML = data.map(d => `
        <div class="project-item" onclick="loadProject('${d.id}')" data-id="${d.id}">
            <i data-lucide="folder" style="width:14px;height:14px;flex-shrink:0;color:#d97706"></i>
            <span class="project-item-name">${d.title}</span>
            <button class="project-item-delete" onclick="deleteProject(event,'${d.id}','${d.title.replace(/'/g,"\\'")}')">
                <i data-lucide="trash-2" style="width:13px;height:13px"></i>
            </button>
        </div>`).join('');
    lucide.createIcons();
}

async function loadProject(id) {
    const { data, error } = await sb.from('documents').select('*').eq('id', id).single();
    if (error || !data) { toast('Failed to load project', true); return; }
    currentDocId = data.id;
    projectFiles = data.assets || [];
    document.getElementById('docTitleInput').value = data.title;
    const mainTex = projectFiles.find(f => f.type === 'tex' && f.main) || projectFiles.find(f => f.type === 'tex');
    if (mainTex) { activeTexName = mainTex.name; editor.setValue(atob(mainTex.content)); }
    else         { activeTexName = null; editor.setValue(data.content || ''); }
    clearPdfPreview();
    renderFilePanel();
    highlightActiveProject(id);
}

async function saveToCloud() {
    if (!currentUser) return;
    syncEditorToFile();
    const title   = document.getElementById('docTitleInput').value.trim() || 'Untitled Project';
    const saveBtn = document.getElementById('saveCloudBtn');
    saveBtn.innerHTML = '<i data-lucide="loader-2" class="spin"></i>';
    lucide.createIcons();
    const payload = { user_id: currentUser.id, title, content: editor.getValue(), assets: projectFiles };
    let res;
    if (currentDocId) { res = await sb.from('documents').update(payload).eq('id', currentDocId); }
    else { res = await sb.from('documents').insert([payload]).select(); if (res.data?.[0]) currentDocId = res.data[0].id; }
    if (res.error) { toast('Save failed: ' + res.error.message, true); }
    else           { toast('Saved ✓'); fetchProjects(); highlightActiveProject(currentDocId); }
    saveBtn.innerHTML = '<i data-lucide="cloud"></i> Save';
    lucide.createIcons();
}

function newBlankProject() {
    currentDocId = null; activeTexName = 'main.tex'; projectFiles = [];
    document.getElementById('docTitleInput').value = 'Untitled Project';
    loadBlankTemplate('New Document', 'Your Name');
    clearPdfPreview();
    renderFilePanel();
    highlightActiveProject(null);
}

function loadBlankTemplate(title, author) {
    const src =
`\\documentclass[12pt]{article}
\\usepackage[utf8]{inputenc}

\\title{${title}}
\\author{${author}}
\\date{\\today}

\\begin{document}
\\maketitle

\\section{Introduction}
Write here...

\\end{document}`;
    editor.setValue(src);
    upsertTexFile('main.tex', src, true);
}

/* ─── Import ───────────────────────────────────────────────── */
function triggerImport(type) {
    closeDropdown();
    document.getElementById({ tex: 'importTexInput', folder: 'importFolderInput', zip: 'importZipInput' }[type]).click();
}

function handleImportTex(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        currentDocId = null; activeTexName = file.name; projectFiles = [];
        document.getElementById('docTitleInput').value = file.name.replace(/\.tex$/i, '');
        editor.setValue(e.target.result);
        upsertTexFile(file.name, e.target.result, true);
        clearPdfPreview(); renderFilePanel(); highlightActiveProject(null);
        toast(`Imported ${file.name}`);
    };
    reader.readAsText(file); input.value = '';
}

async function handleImportFolder(input) {
    const files = Array.from(input.files); if (!files.length) return;
    showUploadOverlay('Importing folder…', files.length);
    currentDocId = null; projectFiles = [];
    const folderName = files[0].webkitRelativePath.split('/')[0];
    document.getElementById('docTitleInput').value = folderName;
    let mainTex = null, done = 0;
    for (const file of files) {
        const base64 = await fileToBase64(file);
        const type   = classifyFile(file.name);
        const isMain = !mainTex && type === 'tex';
        if (isMain) mainTex = file.name;
        projectFiles.push({ name: file.name, content: base64, type, main: isMain });
        updateProgress(++done, files.length);
    }
    if (mainTex) { activeTexName = mainTex; editor.setValue(atob(projectFiles.find(f => f.name === mainTex).content)); }
    hideUploadOverlay(); clearPdfPreview(); renderFilePanel(); highlightActiveProject(null);
    toast(`Imported ${files.length} file(s) from "${folderName}"`);
    input.value = '';
}

async function handleImportZip(input) {
    const file = input.files[0]; if (!file) return;
    showUploadOverlay('Extracting ZIP…', 100);
    try {
        const zip     = await JSZip.loadAsync(file);
        const entries = Object.values(zip.files).filter(f => !f.dir);
        currentDocId = null; projectFiles = [];
        document.getElementById('docTitleInput').value = file.name.replace(/\.zip$/i, '');
        let mainTex = null, done = 0;
        for (const entry of entries) {
            const isBin = isBinaryPath(entry.name);
            const data  = isBin ? await entry.async('base64') : btoa(unescape(encodeURIComponent(await entry.async('string'))));
            const type  = classifyFile(entry.name);
            const isMain = !mainTex && type === 'tex';
            if (isMain) mainTex = entry.name;
            projectFiles.push({ name: entry.name, content: data, type, main: isMain });
            updateProgress(++done, entries.length);
        }
        if (mainTex) { activeTexName = mainTex; editor.setValue(atob(projectFiles.find(f => f.name === mainTex).content)); }
        hideUploadOverlay(); clearPdfPreview(); renderFilePanel(); highlightActiveProject(null);
        toast(`Extracted ${entries.length} file(s) from "${file.name}"`);
    } catch (err) { hideUploadOverlay(); toast('ZIP error: ' + err.message, true); }
    input.value = '';
}

function triggerAddFiles() { document.getElementById('addFilesInput').click(); }

async function handleAddFiles(input) {
    for (const file of Array.from(input.files)) {
        const base64 = await fileToBase64(file);
        const type   = classifyFile(file.name);
        const idx    = projectFiles.findIndex(f => f.name === file.name);
        const entry  = { name: file.name, content: base64, type, main: false };
        if (idx >= 0) projectFiles[idx] = entry; else projectFiles.push(entry);
        if (type === 'tex') openTexInEditor(file.name);
    }
    renderFilePanel(); toast(`Added ${input.files.length} file(s)`); input.value = '';
}

/* ─── File panel ───────────────────────────────────────────── */
function renderFilePanel() {
    const body  = document.getElementById('filePanelBody');
    const tex   = projectFiles.filter(f => f.type === 'tex');
    const bib   = projectFiles.filter(f => f.type === 'bib');
    const img   = projectFiles.filter(f => f.type === 'img');
    const other = projectFiles.filter(f => f.type === 'other');
    if (!projectFiles.length) { body.innerHTML = '<div class="empty-hint">No files yet.</div>'; return; }
    let html = '';
    if (tex.length)   html += fileGroup('TeX Sources',  tex,   'file-text', 'icon-tex');
    if (bib.length)   html += fileGroup('Bibliography', bib,   'book',      'icon-bib');
    if (img.length)   html += fileGroup('Images',       img,   'image',     'icon-img');
    if (other.length) html += fileGroup('Other',        other, 'paperclip', 'icon-other');
    body.innerHTML = html;
    lucide.createIcons();
}

function fileGroup(label, files, icon, iconClass) {
    return `<div class="file-group">
        <div class="file-group-label"><i data-lucide="${icon}" style="width:11px;height:11px"></i>${label}</div>
        ${files.map(f => `
        <div class="file-entry ${f.name === activeTexName ? 'active-file' : ''}" ${f.type === 'tex' ? `onclick="openTexInEditor('${f.name}')"` : ''} title="${f.name}">
            <i data-lucide="${icon}" style="width:13px;height:13px;flex-shrink:0" class="${iconClass}"></i>
            <span class="file-entry-name">${f.name}${f.main ? ' <span style="font-size:10px;color:var(--accent-primary);font-weight:700">[main]</span>' : ''}</span>
            <button class="file-entry-remove" onclick="removeProjectFile(event,'${f.name}')" title="Remove">
                <i data-lucide="x" style="width:12px;height:12px"></i>
            </button>
        </div>`).join('')}
    </div>`;
}

function openTexInEditor(name) {
    syncEditorToFile();
    const entry = projectFiles.find(f => f.name === name);
    if (!entry) return;
    activeTexName = name;
    editor.setValue(atob(entry.content));
    renderFilePanel();
}

function removeProjectFile(event, name) {
    event.stopPropagation();
    projectFiles.splice(projectFiles.findIndex(f => f.name === name), 1);
    if (name === activeTexName) { activeTexName = null; editor.setValue(''); }
    renderFilePanel(); toast(`Removed ${name}`);
}

async function deleteProject(event, id, title) {
    event.stopPropagation();
    if (!await confirm(`Delete "${title}"?`, 'This project will be permanently removed.')) return;
    const { error } = await sb.from('documents').delete().eq('id', id);
    if (error) { toast('Delete failed: ' + error.message, true); return; }
    if (currentDocId === id) newBlankProject();
    fetchProjects(); toast(`Deleted "${title}"`);
}

/* ─── Compile & PDF rendering ──────────────────────────────── */
async function compile() {
    syncEditorToFile();
    const btn = document.getElementById('compileBtn');
    btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Compiling…';
    btn.disabled = true;
    lucide.createIcons();

    try {
        const res = await fetch(COMPILE_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                latex: editor.getValue(),
                files: projectFiles
                    .filter(f => !(f.type === 'tex' && f.name === activeTexName))
                    .map(f => ({ path: f.name, contentBase64: f.content }))
            })
        });

        const data = await res.json();

        if (data.pdf) {
            renderPdf(data.pdf);
        } else {
            clearPdfPreview();
            document.getElementById('previewPlaceholder').innerHTML =
                `<div style="padding:20px;color:var(--accent-danger);width:100%">
                    <strong>Compilation Error</strong>
                    <pre style="white-space:pre-wrap;margin-top:10px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#fca5a5">${data.log || data.error}</pre>
                </div>`;
            document.getElementById('previewPlaceholder').style.display = 'block';
        }
    } catch (err) {
        clearPdfPreview();
        document.getElementById('previewPlaceholder').innerHTML =
            `<div style="padding:20px;color:var(--accent-danger);width:100%">
                <strong>Network Error</strong><p style="margin-top:8px;font-size:13px">${err.message}</p>
            </div>`;
        document.getElementById('previewPlaceholder').style.display = 'block';
    }

    btn.innerHTML = '<i data-lucide="play"></i> Compile';
    btn.disabled = false;
    lucide.createIcons();
}

/**
 * Converts base64 PDF → Blob → Object URL → loads into iframe.
 *
 * Why this is better than a base64 data URL in <embed>:
 *  1. Object URLs have no size limit (data URLs are capped ~2MB in some browsers).
 *  2. The browser streams from the blob rather than parsing a giant string.
 *  3. <iframe> has more consistent scroll/zoom behaviour than <embed>.
 *  4. We can revoke the old URL to free memory before creating the new one.
 */
function renderPdf(base64) {
    // 1. Revoke previous blob URL to free memory
    if (currentPdfBlobUrl) {
        URL.revokeObjectURL(currentPdfBlobUrl);
        currentPdfBlobUrl = null;
    }

    // 2. Decode base64 → Uint8Array → Blob
    const binary = atob(base64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'application/pdf' });

    // 3. Create a fresh Object URL
    currentPdfBlobUrl = URL.createObjectURL(blob);

    // 4. Show loading spinner, hide placeholder
    document.getElementById('previewPlaceholder').style.display = 'none';
    document.getElementById('previewToolbar').style.display     = 'flex';
    document.getElementById('pdfLoadingOverlay').classList.add('show');

    // 5. Wire up the iframe
    const frame = document.getElementById('pdfFrame');
    frame.style.display = 'block';

    // onload fires when the browser has finished rendering the PDF
    frame.onload = () => {
        document.getElementById('pdfLoadingOverlay').classList.remove('show');
        document.getElementById('previewPageInfo').textContent = 'PDF ready';
        document.getElementById('downloadPdfBtn').disabled = false;
    };

    // 6. Set the src — this triggers the load
    frame.src = currentPdfBlobUrl;
}

/** Reload the current PDF (e.g. if rendering stalled) */
function reloadPdfFrame() {
    if (!currentPdfBlobUrl) return;
    const frame = document.getElementById('pdfFrame');
    document.getElementById('pdfLoadingOverlay').classList.add('show');
    frame.onload = () => document.getElementById('pdfLoadingOverlay').classList.remove('show');
    frame.src = currentPdfBlobUrl;
}

/** Reset preview back to placeholder state */
function clearPdfPreview() {
    if (currentPdfBlobUrl) { URL.revokeObjectURL(currentPdfBlobUrl); currentPdfBlobUrl = null; }
    const frame = document.getElementById('pdfFrame');
    frame.src = 'about:blank';
    frame.style.display = 'none';
    document.getElementById('pdfLoadingOverlay').classList.remove('show');
    document.getElementById('previewToolbar').style.display = 'none';
    document.getElementById('downloadPdfBtn').disabled = true;
    const ph = document.getElementById('previewPlaceholder');
    ph.innerHTML = `<i data-lucide="eye" style="width:48px;height:48px;opacity:0.25;color:#aaa"></i><p>Compile to see the PDF preview</p>`;
    ph.style.display = 'flex';
    lucide.createIcons();
}

/* ─── Download ─────────────────────────────────────────────── */
function downloadTeX() {
    const name = (document.getElementById('docTitleInput').value || 'document') + '.tex';
    const blob = new Blob([editor.getValue()], { type: 'text/plain' });
    triggerDownload(URL.createObjectURL(blob), name);
}

function downloadPDF() {
    // Reuse the already-created blob URL — no re-decoding needed
    if (!currentPdfBlobUrl) { toast('Compile first to generate a PDF', true); return; }
    triggerDownload(currentPdfBlobUrl, (document.getElementById('docTitleInput').value || 'document') + '.pdf');
}

function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
}

/* ─── Helpers ──────────────────────────────────────────────── */
function classifyFile(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'tex') return 'tex';
    if (ext === 'bib') return 'bib';
    if (['png','jpg','jpeg','gif','svg','eps'].includes(ext)) return 'img';
    return 'other';
}
function isBinaryPath(name) { return ['png','jpg','jpeg','gif','pdf','eps','zip'].includes(name.split('.').pop().toLowerCase()); }
function fileToBase64(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(e.target.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });
}
function syncEditorToFile() { if (activeTexName) upsertTexFile(activeTexName, editor.getValue(), true); }
function upsertTexFile(name, plainText, isMain) {
    const b64 = btoa(unescape(encodeURIComponent(plainText)));
    const idx = projectFiles.findIndex(f => f.name === name);
    const entry = { name, content: b64, type: 'tex', main: !!isMain };
    if (idx >= 0) projectFiles[idx] = entry; else projectFiles.push(entry);
    activeTexName = name;
}
function highlightActiveProject(id) { document.querySelectorAll('.project-item').forEach(el => el.classList.toggle('active', el.dataset.id === id)); }
function toggleDropdown() { document.getElementById('importDropdown').classList.toggle('open'); }
function closeDropdown()  { document.getElementById('importDropdown').classList.remove('open'); }

let toastTimer;
function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.style.background = isError ? '#dc2626' : '#1e293b';
    el.classList.add('show'); clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

let confirmResolve;
function confirm(title, msg) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent   = msg;
    document.getElementById('confirmModal').classList.add('show');
    return new Promise(res => confirmResolve = res);
}
function resolveConfirm(val) { document.getElementById('confirmModal').classList.remove('show'); if (confirmResolve) { confirmResolve(val); confirmResolve = null; } }

function showUploadOverlay(title, total) { document.getElementById('uploadTitle').textContent = title; document.getElementById('uploadMsg').textContent = `0 / ${total}`; document.getElementById('progressFill').style.width = '0%'; document.getElementById('uploadOverlay').classList.add('show'); }
function updateProgress(done, total) { document.getElementById('uploadMsg').textContent = `${done} / ${total} files`; document.getElementById('progressFill').style.width = Math.round(done / total * 100) + '%'; }
function hideUploadOverlay() { document.getElementById('uploadOverlay').classList.remove('show'); }
</script>
