<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RogueTeX Cloud</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/stex/stex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    :root {
        --bg-body: #f1f5f9; --bg-surface: #ffffff; --bg-panel: #f8fafc;
        --border-light: #cbd5e1; --text-main: #0f172a; --text-muted: #475569;
        --accent-primary: #2563eb; --accent-success: #059669; --accent-danger: #dc2626;
        --radius-md: 6px; --font-sans: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); font-size: 16px; }
    body { background: var(--bg-body); height: 100vh; display: flex; overflow: hidden; }
    .app-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fff; border-bottom: 2px solid var(--border-light); }
    .brand h1 { font-size: 24px; font-weight: 700; color: var(--text-main); }
    .auth-zone { display: flex; align-items: center; gap: 16px; font-weight: 600; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border-light); gap: 12px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; font-size: 15px; font-weight: 600; border-radius: var(--radius-md); border: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; background: #fff; }
    .btn-primary { background: var(--accent-primary); color: #fff; border: none; }
    .btn-success { background: var(--accent-success); color: #fff; border: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .workspace { display: flex; flex: 1; min-height: 0; }
    .sidebar { width: 320px; background: var(--bg-panel); border-right: 2px solid var(--border-light); display: flex; flex-direction: column; padding: 20px; gap: 28px; overflow-y: auto; }
    .sidebar h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 12px; }
    .doc-item, .file-item { padding: 12px; background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-md); margin-bottom: 8px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
    .doc-item:hover, .file-item:hover { border-color: var(--accent-primary); background: #f0f7ff; }
    .doc-item.active { border-color: var(--accent-primary); background: #eff6ff; font-weight: 600; }
    .file-remove-btn { background: transparent; border: none; color: var(--accent-danger); cursor: pointer; padding: 4px; border-radius: 4px; }
    .file-remove-btn:hover { background: #fee2e2; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .preview { flex: 1; padding: 32px; background: white; overflow-y: auto; border-left: 2px solid var(--border-light); }
    #pdfPreview { width: 100%; height: 100%; border: none; }
    #authModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); display: none; align-items: center; justify-content: center; z-index: 999; }
    #authModal.show { display: flex; }
    .modal-content { background: white; padding: 40px; border-radius: 12px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-content h2 { margin-bottom: 20px; font-size: 24px; }
    .modal-content input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border-light); border-radius: var(--radius-md); font-size: 15px; background: #fff; }
    .modal-content button { width: 100%; margin-top: 8px; }
    #authError { color: var(--accent-danger); font-size: 13px; margin-top: 5px; }
    .title-input { width: 100%; padding: 10px 20px; font-size: 15px; font-weight: 600; border: none; border-bottom: 1px solid var(--border-light); background: transparent; }
    .new-project-btn { width: 100%; margin-bottom: 12px; justify-content: center; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>
<body>

<div class="app-container">
    <div class="topbar">
        <div class="brand"><h1>RogueTeX</h1></div>
        <div class="auth-zone" id="authZone">
            <!-- Fully managed by syncAuthUI() — no static children needed -->
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="docTitleInput" class="title-input" value="Untitled Document" placeholder="Document title...">
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="compile()"><i data-lucide="play" style="width:18px;height:18px"></i> Compile</button>
            <button class="btn" id="saveCloudBtn" onclick="saveToCloud()" disabled><i data-lucide="cloud" style="width:18px;height:18px"></i> Save to Cloud</button>
            <button class="btn" onclick="downloadTeX()"><i data-lucide="download" style="width:18px;height:18px"></i> .tex</button>
            <button class="btn btn-success" onclick="downloadPDF()"><i data-lucide="file-down" style="width:18px;height:18px"></i> PDF</button>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <section>
                <h3>Cloud Projects</h3>
                <button class="btn btn-primary new-project-btn" onclick="newProject()"><i data-lucide="plus" style="width:16px;height:16px"></i> New Project</button>
                <div id="cloudDocList">Sign in to sync your work...</div>
            </section>
            <section>
                <h3>Project Assets</h3>
                <input type="file" id="filePicker" multiple style="display:none" onchange="handleFileUpload(this)">
                <button class="btn" style="width:100%" onclick="document.getElementById('filePicker').click()">
                    <i data-lucide="paperclip" style="width:16px;height:16px"></i> Attach .bib / Image
                </button>
                <div id="assetsList" style="margin-top:12px"></div>
            </section>
            <section>
                <h3>Quick Templates</h3>
                <button class="btn" style="width:100%; margin-bottom:8px" onclick="insertTemplate('academic')">
                    <i data-lucide="graduation-cap" style="width:16px;height:16px"></i> Academic Paper
                </button>
                <button class="btn" style="width:100%" onclick="insertTemplate('apa')">
                    <i data-lucide="book-open" style="width:16px;height:16px"></i> APA Bibliography
                </button>
            </section>
        </div>

        <div class="main">
            <textarea id="editor"></textarea>
        </div>

        <div class="preview" id="previewPane">
            <div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); flex-direction:column; gap:12px;">
                <i data-lucide="eye" style="width:48px; height:48px; opacity:0.3;"></i>
                <p>Preview will appear here after compilation</p>
            </div>
        </div>
    </div>
</div>

<div id="authModal">
    <div class="modal-content">
        <h2>Scholar Sign In</h2>
        <input type="email" id="authEmail" placeholder="Email address">
        <input type="password" id="authPass" placeholder="Password">
        <div id="authError"></div>
        <button class="btn btn-primary" onclick="processAuth('login')">Log In</button>
        <button class="btn" style="border:none;" onclick="processAuth('signup')">Create Account</button>
        <button class="btn" style="border:none; color: var(--text-muted);" onclick="toggleModal(false)">Cancel</button>
    </div>
</div>

<script>
    lucide.createIcons();

    const COMPILE_ENDPOINT = 'https://muhsabrys-rogue.hf.space/compile';
    const SB_URL = 'https://suxvtsnkvjazrzhjtocg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1eHZ0c25rdmphenJ6aGp0b2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzExODUsImV4cCI6MjA5MzE0NzE4NX0.zglAuvR1cNrCENhQPz4bYeX2tfKwatbmQye1Ge71bVQ';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let editor, currentUser, currentDocId, projectAssets = [];

    window.onload = () => {
        editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
            mode: 'stex', theme: 'monokai', lineNumbers: true, lineWrapping: true
        });
        editor.setValue(
`\\documentclass[12pt]{article}
\\usepackage[utf8]{inputenc}
\\usepackage{arabxetex}

\\title{MSA Research}
\\author{Muhammad S. Abdo}

\\begin{document}
\\maketitle

Let's roll!

\\section{Introduction}
Write here...

\\end{document}`);
        checkSession();
        lucide.createIcons();
    };

    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        syncAuthUI(session?.user ?? null);
        supabaseClient.auth.onAuthStateChange((_, session) => syncAuthUI(session?.user ?? null));
    }

    // FIX: Removed orphaned getElementById('userEmail') call.
    // authZone.innerHTML is fully rebuilt each time, so querying a stale
    // child element from a previous render would return null after sign-out.
    function syncAuthUI(user) {
        currentUser = user;
        const authZone = document.getElementById('authZone');
        const cloudBtn = document.getElementById('saveCloudBtn');
        if (user) {
            // Email is rendered directly inside the rebuilt innerHTML — no separate element needed
            authZone.innerHTML = `<span style="color:var(--text-muted); font-size:14px;">${user.email}</span><button class="btn" onclick="signOut()">Sign Out</button>`;
            cloudBtn.disabled = false;
            fetchProjects();
        } else {
            authZone.innerHTML = '<button class="btn btn-primary" onclick="toggleModal(true)">Sign In</button>';
            cloudBtn.disabled = true;
            document.getElementById('cloudDocList').innerHTML = 'Sign in to sync your work...';
        }
        lucide.createIcons();
    }

    async function signOut() { await supabaseClient.auth.signOut(); }

    async function fetchProjects() {
        const { data, error } = await supabaseClient.from('documents').select('id, title, assets');
        const list = document.getElementById('cloudDocList');
        if (error) {
            console.error("Fetch Error:", error);
            list.innerHTML = `<div style="color:var(--accent-danger)">Error: ${error.message}</div>`;
        } else {
            list.innerHTML = data.map(d => `
                <div class="doc-item" onclick="loadProject('${d.id}')" data-id="${d.id}">
                    <span>${d.title}</span>
                    <i data-lucide="chevron-right" style="width:14px"></i>
                </div>`).join('') || '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">No projects saved yet.</div>';
            lucide.createIcons();
        }
    }

    async function saveToCloud() {
        if (!currentUser) return;
        const title = document.getElementById('docTitleInput').value;
        const saveBtn = document.getElementById('saveCloudBtn');
        saveBtn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Syncing...';
        lucide.createIcons();

        const payload = {
            user_id: currentUser.id,
            title: title,
            content: editor.getValue(),
            assets: projectAssets
        };

        let res;
        if (currentDocId) {
            res = await supabaseClient.from('documents').update(payload).eq('id', currentDocId);
        } else {
            res = await supabaseClient.from('documents').insert([payload]).select();
            if (res.data && res.data[0]) currentDocId = res.data[0].id;
        }

        if (res.error) {
            console.error("Save Error:", res.error);
            alert('Save failed: ' + res.error.message);
        } else {
            saveBtn.innerHTML = '<i data-lucide="check"></i> Saved';
            lucide.createIcons();
            setTimeout(() => {
                saveBtn.innerHTML = '<i data-lucide="cloud"></i> Save to Cloud';
                lucide.createIcons();
            }, 2000);
            fetchProjects();
        }
        lucide.createIcons();
    }

    async function loadProject(id) {
        const { data } = await supabaseClient.from('documents').select('*').eq('id', id).single();
        if (data) {
            editor.setValue(data.content);
            document.getElementById('docTitleInput').value = data.title;
            currentDocId = data.id;
            projectAssets = data.assets || [];
            renderAssets();
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.doc-item[data-id="${id}"]`)?.classList.add('active');
        }
    }

    function newProject() {
        editor.setValue(
`\\documentclass[12pt]{article}
\\usepackage[utf8]{inputenc}

\\title{New Document}
\\author{Your Name}

\\begin{document}
\\maketitle

\\section{Introduction}
Start writing here...

\\end{document}`);
        document.getElementById('docTitleInput').value = 'Untitled Document';
        currentDocId = null;
        projectAssets = [];
        renderAssets();
        document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
    }

    async function handleFileUpload(input) {
        for (const file of input.files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result.split(',')[1];
                projectAssets.push({ name: file.name, content: base64 });
                renderAssets();
            };
            reader.readAsDataURL(file);
        }
        input.value = '';
    }

    function renderAssets() {
        const list = document.getElementById('assetsList');
        if (projectAssets.length === 0) {
            list.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">No files attached yet.</div>';
        } else {
            list.innerHTML = projectAssets.map((a, i) => `
                <div class="file-item">
                    <span>${a.name}</span>
                    <button class="file-remove-btn" onclick="removeAsset(${i})">
                        <i data-lucide="trash-2" style="width:14px;height:14px"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }
    }

    function removeAsset(idx) {
        projectAssets.splice(idx, 1);
        renderAssets();
    }

    async function processAuth(mode) {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        const errDiv = document.getElementById('authError');
        errDiv.textContent = '';
        try {
            let res;
            if (mode === 'login') {
                res = await supabaseClient.auth.signInWithPassword({ email, password: pass });
            } else {
                res = await supabaseClient.auth.signUp({ email, password: pass });
            }
            if (res.error) throw res.error;
            toggleModal(false);
        } catch (err) {
            errDiv.textContent = err.message;
        }
    }

    function toggleModal(show) {
        document.getElementById('authModal').className = show ? 'show' : '';
    }

    async function compile() {
        const compileBtn = document.querySelector('.btn-primary');
        compileBtn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Compiling...';
        lucide.createIcons();

        try {
            const res = await fetch(COMPILE_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latex: editor.getValue(),
                    files: projectAssets.map(a => ({ path: a.name, contentBase64: a.content }))
                })
            });

            const data = await res.json();
            if (data.pdf) {
                document.getElementById('previewPane').innerHTML =
                    `<embed id="pdfPreview" src="data:application/pdf;base64,${data.pdf}" type="application/pdf" width="100%" height="100%">`;
            } else if (data.error) {
                document.getElementById('previewPane').innerHTML =
                    `<div style="padding:20px; color:var(--accent-danger)"><h3>Compilation Error</h3><pre style="white-space:pre-wrap; margin-top:12px;">${data.log || data.error}</pre></div>`;
            }
        } catch (err) {
            document.getElementById('previewPane').innerHTML =
                `<div style="padding:20px; color:var(--accent-danger)"><h3>Network Error</h3><p>${err.message}</p></div>`;
        }

        compileBtn.innerHTML = '<i data-lucide="play"></i> Compile';
        lucide.createIcons();
    }

    function downloadTeX() {
        const blob = new Blob([editor.getValue()], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (document.getElementById('docTitleInput').value || 'document') + '.tex';
        a.click();
    }

    function downloadPDF() {
        const embed = document.getElementById('pdfPreview');
        if (!embed) { alert('Please compile first to generate PDF'); return; }
        const pdfData = embed.src.split(',')[1];
        const blob = new Blob([Uint8Array.from(atob(pdfData), c => c.charCodeAt(0))], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (document.getElementById('docTitleInput').value || 'document') + '.pdf';
        a.click();
    }

    function insertTemplate(type) {
        if (type === 'academic') {
            editor.setValue(
`\\documentclass[12pt]{article}
\\usepackage[utf8]{inputenc}
\\usepackage{amsmath}
\\usepackage{graphicx}
\\usepackage{cite}

\\title{Research Paper Title}
\\author{Your Name \\\\ Your Institution}
\\date{\\today}

\\begin{document}
\\maketitle

\\begin{abstract}
Your abstract here.
\\end{abstract}

\\section{Introduction}
Introduction text...

\\section{Methodology}
Methodology description...

\\section{Results}
Results and analysis...

\\section{Conclusion}
Concluding remarks...

\\bibliographystyle{plain}
\\bibliography{references}

\\end{document}`);
        } else if (type === 'apa') {
            editor.setValue(
`\\documentclass[12pt]{article}
\\usepackage[utf8]{inputenc}
\\usepackage{apacite}

\\title{APA Style Document}
\\author{Your Name}
\\date{\\today}

\\begin{document}
\\maketitle

\\section{Introduction}
Text with citations \\cite{author2020}.

\\bibliographystyle{apacite}
\\bibliography{references}

\\end{document}`);
        }
    }
</script>

</body>
</html>
